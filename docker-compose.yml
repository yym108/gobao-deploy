name: gobao
services:
  mysql-user:
    image: mysql:8.4
    environment: { MYSQL_ROOT_PASSWORD: root, MYSQL_DATABASE: user }
    ports: ["${MYSQL_USER_PORT:-3307}:3306"]
    volumes: ["./sql/init-user.sql:/docker-entrypoint-initdb.d/init.sql"]
  mysql-product:
    image: mysql:8.4
    environment: { MYSQL_ROOT_PASSWORD: root, MYSQL_DATABASE: product }
    ports: ["${MYSQL_PRODUCT_PORT:-3308}:3306"]
    volumes: ["./sql/init-product.sql:/docker-entrypoint-initdb.d/init.sql"]
  mysql-order:
    image: mysql:8.4
    environment: { MYSQL_ROOT_PASSWORD: root, MYSQL_DATABASE: order }
    ports: ["${MYSQL_ORDER_PORT:-3309}:3306"]
    volumes: ["./sql/init-order.sql:/docker-entrypoint-initdb.d/init.sql"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  mysql-gateway:
    image: mysql:8.4
    environment: { MYSQL_ROOT_PASSWORD: root, MYSQL_DATABASE: gateway }
    ports: ["${MYSQL_GATEWAY_PORT:-3311}:3306"]
    volumes: ["./sql/init-gateway.sql:/docker-entrypoint-initdb.d/init.sql"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  mysql-payment:
    image: mysql:8.4
    environment: { MYSQL_ROOT_PASSWORD: root, MYSQL_DATABASE: payment }
    ports: ["${MYSQL_PAYMENT_PORT:-3310}:3306"]
    volumes: ["./sql/init-payment.sql:/docker-entrypoint-initdb.d/init.sql"]
  redis:
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6379}:6379"]
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    volumes: ["nats-data:/data"]
    ports: ["${NATS_PORT:-4222}:4222", "${NATS_MONITOR_PORT:-8222}:8222"]
  prometheus:
    image: prom/prometheus:latest
    volumes: ["./prometheus.yml:/etc/prometheus/prometheus.yml"]
    ports: ["${PROMETHEUS_PORT:-9090}:9090"]

  user:
    build:
      context: ${GOBAO_BUILD_CONTEXT:-..}
      dockerfile: gobao-user/Dockerfile
    environment:
      USER_HTTP_ADDR: ":8080"
      USER_GRPC_ADDR: ":9090"
      USER_MYSQL_DSN: "root:root@tcp(mysql-user:3306)/user?charset=utf8mb4&parseTime=True&loc=Local"
      USER_REDIS_ADDR: "redis:6379"
      USER_JWT_SECRET: "gobao-dev-secret-change-in-prod"
      USER_JWT_EXPIRY: "24h"
    depends_on: [mysql-user, redis, nats]
    ports: ["${USER_HTTP_PORT:-18001}:8080", "${USER_GRPC_PORT:-19001}:9090"]
  product:
    build:
      context: ${GOBAO_BUILD_CONTEXT:-..}
      dockerfile: gobao-product/Dockerfile
    environment:
      PRODUCT_HTTP_ADDR: ":8080"
      PRODUCT_GRPC_ADDR: ":9090"
      PRODUCT_LOG_LEVEL: "info"
      PRODUCT_MYSQL_DSN: "root:root@tcp(mysql-product:3306)/product?charset=utf8mb4&parseTime=True&loc=Local"
      PRODUCT_REDIS_ADDR: "redis:6379"
      PRODUCT_REDIS_DB: "0"
    depends_on: [mysql-product, redis, nats]
    ports: ["${PRODUCT_HTTP_PORT:-18002}:8080", "${PRODUCT_GRPC_PORT:-19002}:9090"]
  order:
    build:
      context: ${GOBAO_BUILD_CONTEXT:-..}
      dockerfile: gobao-order/Dockerfile
    environment:
      ORDER_HTTP_ADDR: ":8080"
      ORDER_GRPC_ADDR: ":9090"
      ORDER_LOG_LEVEL: "info"
      ORDER_MYSQL_DSN: "root:root@tcp(mysql-order:3306)/order?charset=utf8mb4&parseTime=True&loc=Local"
      ORDER_PRODUCT_GRPC_ADDR: "product:9090"
      ORDER_REDIS_ADDR: "redis:6379"
      ORDER_REDIS_DB: "0"
      ORDER_NATS_URL: "nats://nats:4222"
      ORDER_NATS_STREAM: "SECKILL"
      ORDER_SECKILL_ORDER_SUBJECT: "seckill.order"
      ORDER_SECKILL_ORDER_CONSUMER: "order-mock"
      ORDER_ORDER_CREATED_SUBJECT: "order.created"
      ORDER_ORDER_CANCELLED_SUBJECT: "order.cancelled"
      ORDER_PAYMENT_PAID_SUBJECT: "payment.paid"
      ORDER_PAYMENT_FAILED_SUBJECT: "payment.failed"
    depends_on:
      mysql-order:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    ports: ["${ORDER_HTTP_PORT:-18003}:8080"]
  payment:
    build:
      context: ${GOBAO_BUILD_CONTEXT:-..}
      dockerfile: gobao-payment/Dockerfile
    environment:
      PAYMENT_HTTP_ADDR: ":8080"
      PAYMENT_GRPC_ADDR: ":9090"
      PAYMENT_LOG_LEVEL: "info"
      PAYMENT_MYSQL_DSN: "root:root@tcp(mysql-payment:3306)/payment?charset=utf8mb4&parseTime=True&loc=Local"
      PAYMENT_NATS_URL: "nats://nats:4222"
      PAYMENT_NATS_STREAM: "SECKILL"
      PAYMENT_ORDER_CREATED_SUBJECT: "order.created"
      PAYMENT_ORDER_CREATED_CONSUMER: "payment-mock"
      PAYMENT_PAYMENT_PAID_SUBJECT: "payment.paid"
      PAYMENT_PAYMENT_FAILED_SUBJECT: "payment.failed"
    depends_on: [mysql-payment, redis, nats]
    ports: ["${PAYMENT_HTTP_PORT:-18004}:8080"]
  gateway:
    build:
      context: ${GOBAO_BUILD_CONTEXT:-..}
      dockerfile: gobao-gateway/Dockerfile
    environment:
      GATEWAY_ADDR: ":8080"
      GATEWAY_USER_GRPC_ADDR: "user:9090"
      GATEWAY_PRODUCT_GRPC_ADDR: "product:9090"
      GATEWAY_ORDER_GRPC_ADDR: "order:9090"
      GATEWAY_PAYMENT_GRPC_ADDR: "payment:9090"
      GATEWAY_MYSQL_DSN: "root:root@tcp(mysql-gateway:3306)/gateway?charset=utf8mb4&parseTime=True&loc=Local"
      GATEWAY_REDIS_ADDR: "redis:6379"
      GATEWAY_REDIS_DB: "0"
      GATEWAY_NATS_URL: "nats://nats:4222"
      GATEWAY_NATS_STREAM: "SECKILL"
      GATEWAY_SECKILL_SUBJECT: "seckill.order"
      GATEWAY_JWT_SECRET: "gobao-dev-secret-change-in-prod"
      GATEWAY_LOG_LEVEL: "info"
    depends_on:
      user:
        condition: service_started
      product:
        condition: service_started
      order:
        condition: service_started
      payment:
        condition: service_started
      mysql-gateway:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    ports: ["${GATEWAY_HTTP_PORT:-18000}:8080"]

volumes:
  nats-data: {}
